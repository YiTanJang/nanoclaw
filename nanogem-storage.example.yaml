apiVersion: v1
kind: PersistentVolume
metadata:
  name: nanogem-pv
spec:
  capacity:
    storage: 10Gi # Adjust to your needs
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=3
    - tcp
    - nolock
  nfs:
    path: /export/path/to/nanogem # The absolute path on your NFS server
    server: 192.168.1.100 # Your NFS server IP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nanogem-pvc
  namespace: nanogem
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi # Must match the PV capacity
  volumeName: nanogem-pv
