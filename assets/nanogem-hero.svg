<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>
  
  <!-- Subtle Grid -->
  <path d="M0 0 L1280 0 M0 100 L1280 100 M0 200 L1280 200 M0 300 L1280 300 M0 400 L1280 400 M0 500 L1280 500 M0 600 L1280 600 M0 700 L1280 700" stroke="#1e293b" stroke-width="1" opacity="0.5"/>
  <path d="M0 0 L0 720 M100 0 L100 720 M200 0 L200 720 M300 0 L300 720 M400 0 L400 720 M500 0 L500 720 M600 0 L600 720 M700 0 L700 720 M800 0 L800 720 M900 0 L900 720 M1000 0 L1000 720 M1100 0 L1100 720 M1200 0 L1200 720" stroke="#1e293b" stroke-width="1" opacity="0.5"/>

  <!-- Circuit Paths -->
  <g stroke="url(#gemGradient)" stroke-width="2" fill="none" opacity="0.2">
    <path d="M100 100 L300 100 L350 150 L350 300" />
    <path d="M1180 620 L1000 620 L950 570 L950 400" />
    <path d="M200 600 L400 600 L450 550" />
    <path d="M1080 100 L880 100 L830 150" />
  </g>

  <!-- Gem Cluster -->
  <g transform="translate(640, 360)" filter="url(#glow)">
    <!-- Primary Gem -->
    <path d="M0 -180 L180 -60 L180 60 L0 180 L-180 60 L-180 -60 Z" fill="#0f172a" stroke="url(#gemGradient)" stroke-width="8"/>
    <path d="M0 -180 L0 180 M-180 -60 L180 60 M180 -60 L-180 60" stroke="url(#gemGradient)" stroke-width="2" opacity="0.4"/>
    
    <!-- Secondary Accents -->
    <circle r="40" fill="none" stroke="url(#gemGradient)" stroke-width="4" />
    <circle r="10" fill="url(#gemGradient)" cy="-180" />
    <circle r="10" fill="url(#gemGradient)" cy="180" />
    <circle r="10" fill="url(#gemGradient)" cx="180" cy="60" />
    <circle r="10" fill="url(#gemGradient)" cx="-180" cy="60" />
  </g>

  <!-- Brand Text -->
  <text x="640" y="620" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="20" filter="url(#glow)">NANOGEM</text>
  <text x="640" y="660" font-family="Arial, sans-serif" font-size="20" fill="url(#gemGradient)" text-anchor="middle" letter-spacing="5">KUBERNETES-NATIVE AGENT SWARM</text>
</svg>
